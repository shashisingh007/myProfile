<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevOps Portfolio | Shashi Kumar Singh</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- HEADER COMPONENT -->
<div id="header"></div>



<!-- HERO SECTION -->

<section id="hero" class="hero">

<div class="hero-container">

<div class="hero-left">

</div>

<div class="hero-right">

<h1 id="name"></h1>

<h2 id="title"></h2>

<p id="tagline"></p>

<div class="hero-buttons">

<a id="downloadResume" class="btn-primary">Download Resume</a>

<a id="linkedinBtn" class="btn-secondary" target="_blank">LinkedIn</a>

<a id="githubBtn" class="btn-secondary" target="_blank">GitHub</a>

</div>

</div>

</div>

</section>



<!-- SUMMARY SECTION -->

<section class="section">

<h2 class="section-title">Professional Summary</h2>

<p id="summary" class="summary"></p>

</section>



<!-- CORE COMPETENCIES -->

<h2 class="section-title">Core Competencies</h2>

<div id="competenciesContainer" class="competencies"></div>

</section>



<!-- SKILLS SECTION -->

<section class="section">

<h2 class="section-title">Technical Skills</h2>

<div id="skillsContainer" class="skills-grid"></div>

</section>



<!-- EXPERIENCE SECTION -->

<section class="section">

<h2 class="section-title">Professional Experience</h2>

<div id="experienceContainer" class="experience"></div>

</section>



<!-- PROJECTS SECTION -->

<section class="section">

<h2 class="section-title">Key Projects</h2>

<div id="projectsContainer" class="projects"></div>

</section>



<!-- CERTIFICATIONS -->

<section class="section">

<h2 class="section-title">Certifications</h2>

<ul id="certificationsContainer" class="certifications"></ul>

</section>



<!-- EDUCATION -->

<section class="section">

<h2 class="section-title">Education</h2>

<div id="educationContainer" class="education"></div>

</section>



<!-- ACHIEVEMENTS -->

<section class="section">

<h2 class="section-title">Achievements</h2>

<ul id="achievementsContainer" class="achievements"></ul>

</section>



<!-- FOOTER COMPONENT -->

<div id="footer"></div>



<script src="script.js"></script>

</html>
